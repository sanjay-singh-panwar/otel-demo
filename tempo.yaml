#This will tell where will Grafana receive and store tempo traces
auth_enabled: false

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local  #Traces stores in local disk 
    local:
      path: /tmp/tempo/traces

